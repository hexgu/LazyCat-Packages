application:
  subdomain: lobehub
  oidc_redirect_path: /api/auth/callback/generic-oidc
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://lobe.cloud.lazycat.app.lobehub.lzcapp:3210
      disable_trim_location: true
    - location: /
      domain_prefix: s3
      backend: http://rustfs.cloud.lazycat.app.lobehub.lzcapp:9000
      disable_trim_location: true
services:
  lobe:
    image: registry.lazycat.cloud/hexg/lobehub/lobehub:125b1fd8423329c4
    depends_on:
      - postgresql
      - redis
      - rustfs
      - rustfs-init
    environment:
      - APP_URL=https://{{ .S.AppDomain }}
      - INTERNAL_APP_URL=http://lobe.cloud.lazycat.app.lobehub.lzcapp:3210
      - >-
        DATABASE_URL=postgresql://postgres:{{ stable_secret "postgres_password"
        | sha256sum | substr 0 32
        }}@postgresql.cloud.lazycat.app.lobehub.lzcapp:5432/lobechat
      - REDIS_URL=redis://redis.cloud.lazycat.app.lobehub.lzcapp:6379
      - REDIS_PREFIX=lobechat
      - REDIS_TLS=0
      - SSRF_ALLOW_PRIVATE_IP_ADDRESS=1
      - S3_BUCKET=lobe
      - S3_ENDPOINT=https://s3-{{ .S.AppDomain }}
      - S3_PUBLIC_DOMAIN=https://s3-{{ .S.AppDomain }}
      - S3_ENABLE_PATH_STYLE=1
      - S3_SET_ACL=0
      - S3_ACCESS_KEY=admin
      - S3_ACCESS_KEY_ID=admin
      - >-
        S3_SECRET_ACCESS_KEY={{ stable_secret "rustfs_secret_key" | sha256sum |
        substr 0 32 }}
      - LLM_VISION_IMAGE_USE_BASE64=1
      - >-
        KEY_VAULTS_SECRET={{ stable_secret "key_vaults_secret" | sha256sum |
        substr 0 32 | b64enc }}
      - >-
        AUTH_SECRET={{ stable_secret "auth_secret" | sha256sum | substr 0 32 |
        b64enc }}
      - ENABLE_OIDC={{ if and .U.enable_oidc .U.jwks_key }}1{{ else }}0{{ end }}
      - >-
        JWKS_KEY={{ if and .U.enable_oidc .U.jwks_key }}{{ .U.jwks_key }}{{ end
        }}
      - AUTH_SSO_PROVIDERS=generic-oidc
      - AUTH_GENERIC_OIDC_ID=${LAZYCAT_AUTH_OIDC_CLIENT_ID}
      - AUTH_GENERIC_OIDC_SECRET=${LAZYCAT_AUTH_OIDC_CLIENT_SECRET}
      - AUTH_GENERIC_OIDC_ISSUER=${LAZYCAT_AUTH_OIDC_ISSUER_URI}
  postgresql:
    image: registry.lazycat.cloud/hexg/paradedb/paradedb:48d14ddc8eec68e2
    binds:
      - /lzcapp/var/postgresql-v2:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: lobechat
      POSTGRES_PASSWORD: '{{ stable_secret "postgres_password" | sha256sum | substr 0 32 }}'
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -h 127.0.0.1 -p 5432 -U postgres -d lobechat
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
      start_interval: 2s
  redis:
    image: registry.lazycat.cloud/redis:8.0
    command: redis-server --save 60 1000 --appendonly yes
    binds:
      - /lzcapp/var/redis:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 5
  rustfs:
    image: registry.lazycat.cloud/hexg/rustfs/rustfs:9a2eb235285368fe
    user: "0"
    binds:
      - /lzcapp/var/rustfs/data:/data
      - /lzcapp/var/rustfs/logs:/logs
    environment:
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ACCESS_KEY=admin
      - >-
        RUSTFS_SECRET_KEY={{ stable_secret "rustfs_secret_key" | sha256sum |
        substr 0 32 }}
      - RUSTFS_CORS_ALLOWED_ORIGINS=*
    command: >-
      --access-key admin --secret-key {{ stable_secret "rustfs_secret_key" |
      sha256sum | substr 0 32 }} /data
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://localhost:9000/health >/dev/null 2>&1 || exit 1
      interval: 5s
      timeout: 3s
      retries: 30
  rustfs-init:
    image: registry.lazycat.cloud/hexg/pgsty/mc:dfa46c69be45799f
    depends_on:
      - rustfs
    entrypoint: /bin/sh
    command: >-
      -c 'set -eu; until mc alias set rustfs
      "http://rustfs.cloud.lazycat.app.lobehub.lzcapp:9000" "admin" "{{
      stable_secret "rustfs_secret_key" | sha256sum | substr 0 32 }}"; do
        sleep 2;
      done; mc mb "rustfs/lobe" --ignore-existing; mc anonymous set-json
      /lzcapp/pkg/content/bucket.config.json "rustfs/lobe"; touch
      /tmp/rustfs-init.done; tail -f /dev/null'
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /tmp/rustfs-init.done
      interval: 5s
      timeout: 3s
      retries: 12
