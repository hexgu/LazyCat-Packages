params:
  - id: enable_oidc
    type: bool
    name: "启用桌面端 OIDC"
    description: "启用后会为 LobeHub 桌面端自动同步开启 OIDC 支持；需同时提供 JWKS_KEY。"
    default_value: "false"
  - id: jwks_key
    type: secret
    name: "JWKS_KEY"
    description: "LobeHub 桌面端 OIDC 所需的 JWKS JSON 字符串。开启桌面端 OIDC 时必填，可用项目内 scripts/generate-oidc-jwk.mjs 生成。"
    optional: true

