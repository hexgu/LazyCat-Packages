application:
  subdomain: new-api
  public_path:
    - /
    - !/console
    - !/login
  routes:
    - /=http://new-api.cloud.lazycat.app.new-api.lzcapp:3000
  health_check:
    test_url: http://new-api.cloud.lazycat.app.new-api.lzcapp:3000/api/status
services:
  new-api:
    image: registry.lazycat.cloud/hexg/calciumion/new-api:bc2ce40dcafd30a8
    command: --log-dir /app/logs
    binds:
      - /lzcapp/var/data:/data
      - /lzcapp/var/logs:/app/logs
    environment:
      SQL_DSN: postgresql://root:{{ stable_secret "postgres_password" }}@postgres.cloud.lazycat.app.new-api.lzcapp:5432/new-api
      REDIS_CONN_STRING: redis://:{{ stable_secret "redis_password" }}@redis.cloud.lazycat.app.new-api.lzcapp:6379
      TZ: Asia/Shanghai
      ERROR_LOG_ENABLED: "true"
      BATCH_UPDATE_ENABLED: "true"
      FRONTEND_BASE_URL: ${LAZYCAT_APP_DOMAIN}
    depends_on:
      - redis
      - postgres
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O - http://localhost:3000/api/status | grep -o '"success":\\s*true' || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
  redis:
    image: registry.lazycat.cloud/hexg/library/redis:09957f31da3c43c7
    command: redis-server --requirepass {{ stable_secret "redis_password" }}
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a '{{ stable_secret "redis_password" }}' ping | grep PONG
      interval: 5s
      timeout: 5s
      retries: 5
  postgres:
    image: registry.lazycat.cloud/hexg/library/postgres:6cf0e1b09d8b2b1a
    binds:
      - /lzcapp/var/pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: '{{ stable_secret "postgres_password" }}'
      POSTGRES_DB: new-api
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U root -d new-api
      interval: 5s
      timeout: 5s
      retries: 10
