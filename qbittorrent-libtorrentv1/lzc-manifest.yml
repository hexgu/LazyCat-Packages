lzc-sdk-version: '0.1'
name: qBittorrent
package: cloud.lazycat.app.qbittorrent-libtorrentv1
version: 5.1.4-libtorrentv1
description: qBittorrent libtorrent v1 版本（防止内存泄漏、PT可用）
homepage: https://github.com/hexgu/LazyCat-Packages
author: Hexg
application:
  subdomain: qbittorrent
  background_task: true
  multi_instance: false
  gpu_accel: false
  kvm_accel: false
  usb_accel: false
  file_handler:
    mime:
      - application/x-magnet
      - application/x-bittorrent
    actions:
      open: /open?file=%u
  routes:
    - /=http://qbittorrent:8080/
  public_path:
    - /
  ingress:
    - protocol: tcp
      port: 37312
      service: qbittorrent
    - protocol: udp
      port: 37312
      service: qbittorrent
services:
  qbittorrent:
    image: ghcr.nju.edu.cn/linuxserver/qbittorrent:5.1.4-libtorrentv1
    environment:
      - PUID=0
      - PGID=0
      - TZ=Asia/Shanghai
      - WEBUI_PORT=8080
      - TORRENTING_PORT=37312
    binds:
      - /lzcapp/run/mnt/home:/home
      - /lzcapp/var/config:/config
      - /lzcapp/var/downloads:/downloads